<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Student</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

  <!-- Form Container -->
  <div class="bg-white shadow-2xl rounded-3xl w-full max-w-lg p-10">
    
    <!-- Heading -->
    <h1 class="text-4xl font-extrabold text-gray-800 mb-8 text-center drop-shadow-sm">
      Add New Student
    </h1>
    
    <!-- Form -->
    <form method="POST" action="{% url 'add_student' %}" class="space-y-6">
      {% csrf_token %}
      
      <!-- Name -->
      <div>
        <label class="block text-gray-700 font-medium mb-2">Full Name</label>
        <input type="text" name="input_name" placeholder="John Doe" required
               class="w-full px-5 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 shadow-sm">
      </div>
      
      <!-- Email -->
      <div>
        <label class="block text-gray-700 font-medium mb-2">Email</label>
        <input type="email" name="input_email" placeholder="example@email.com" required
               class="w-full px-5 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 shadow-sm">
      </div>
      
      <!-- Phone Number -->
      <div>
        <label class="block text-gray-700 font-medium mb-2">Phone Number</label>
        <input type="text" name="input_phone_number" placeholder="9876543210" required
               class="w-full px-5 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 shadow-sm">
      </div>
      
      <!-- Course -->
      <div>
        <label class="block text-gray-700 font-medium mb-2">Course</label>
        <input type="text" name="input_course" placeholder="Computer Science" required
               class="w-full px-5 py-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 shadow-sm">
      </div>
      
      <!-- Submit Button -->
      <button type="submit"
              class="w-full bg-gradient-to-r from-green-400 to-green-600 text-white px-5 py-3 rounded-xl font-semibold hover:scale-105 transition-transform shadow-lg flex items-center justify-center gap-2">
        <i class="fas fa-plus"></i> Add Student
      </button>
    </form>
    
    <!-- Back Button -->
    <a href="{% url 'student_home' %}" 
       class="block mt-6 text-center text-blue-500 hover:underline font-medium">
       &larr; Back to Dashboard
    </a>
    
  </div>

</body>
</html>
